<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่ายปฏิทินอัจฉริยะ</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fef1f2 0%, #fff5f5 50%, #f0fdf4 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            padding: 25px 20px 90px 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 183, 178, 0.15);
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            color: #ff7b7b;
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 24px;
            font-weight: 700;
        }
        .current-date {
            text-align: center;
            color: #8a9ba8;
            font-size: 13px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* 📊 ตารางสรุปยอดแยกช่วงเวลา */
        .summary-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 25px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 183, 178, 0.1);
            border: 1px solid #ffe3e2;
        }
        .summary-table th, .summary-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #ffe3e2;
            border-right: 1px solid #ffe3e2;
        }
        .summary-table th:last-child, .summary-table td:last-child {
            border-right: none;
        }
        .summary-table tr:last-child td {
            border-bottom: none;
        }
        .summary-table th {
            background-color: #ffe5e3;
            color: #ff6b6b;
            font-weight: 600;
            font-size: 14px;
        }
        .summary-table td {
            background-color: #fff;
            font-size: 15px;
            font-weight: bold;
        }
        .summary-table td:first-child {
            color: #6d7c8c;
            font-weight: 600;
            background-color: #fffaf9;
        }
        .text-income { color: #2bb673; }
        .text-expense { color: #ff6b6b; }
        .text-balance { color: #4a5568; }

        /* 🗓️ สไตล์ปฏิทิน */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px 0;
        }
        .calendar-header h3 { 
            margin: 0; 
            font-size: 18px; 
            color: #ff6b6b; 
            font-weight: bold;
        }
        .btn-nav-month {
            background: #ffb7b2;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 3px 10px rgba(255, 183, 178, 0.3);
        }
        .btn-nav-month:hover { background: #ff9e99; transform: translateY(-1px); }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 25px;
        }
        .weekday-label {
            font-weight: bold;
            font-size: 13px;
            color: #ffb7b2;
            text-align: center;
            padding: 5px 0;
        }
        .calendar-day {
            background: #fff;
            border: 1px solid #fff0ef;
            border-radius: 10px;
            min-height: 58px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(255, 183, 178, 0.05);
        }
        .calendar-day:hover { background-color: #fff5f5; transform: scale(1.03); }
        .calendar-day .day-num {
            font-size: 12px;
            font-weight: bold;
            color: #657786;
            align-self: flex-start;
        }
        .calendar-day .day-amounts {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .calendar-day .day-inc { font-size: 8px; color: #2bb673; font-weight: bold; }
        .calendar-day .day-exp { font-size: 8px; color: #ff6b6b; font-weight: bold; }
        
        .calendar-day.day-has-income { background-color: #f0fdf4; border-color: #c2f3d6; }
        .calendar-day.day-has-expense { background-color: #fff5f5; border-color: #ffe3e2; }
        .calendar-day.empty { background: transparent; border: none; cursor: default; box-shadow: none; }
        .calendar-day.empty:hover { background: transparent; transform: none; }
        .calendar-day.selected { border: 2px solid #ffb7b2; background-color: #fff0ef; }

        /* 📜 รายการประวัติรายวัน */
        .history-section-title {
            font-size: 17px;
            font-weight: bold;
            color: #ff6b6b;
            margin-top: 10px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #ffe3e2;
            padding-bottom: 8px;
        }
        .history-card {
            background: white;
            border: 1px solid #fff0ef;
            border-left: 5px solid #ccc;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(255, 183, 178, 0.05);
        }
        .card-left .card-name {
            font-size: 16px;
            font-weight: bold;
            color: #334e68;
            margin-bottom: 4px;
        }
        .card-left .card-time {
            font-size: 11px;
            color: #bcccdc;
            font-weight: 500;
        }
        .card-right {
            text-align: right;
        }
        .card-amount {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .card-actions {
            display: flex;
            gap: 5px;
            justify-content: flex-end;
        }
        .card-actions button {
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-card-edit { background-color: #e3f2fd; color: #1e88e5; }
        .btn-card-edit:hover { background-color: #1e88e5; color: white; }
        .btn-card-delete { background-color: #fff5f5; color: #ff6b6b; }
        .btn-card-delete:hover { background-color: #ff6b6b; color: white; }

        /* 📝 ฟอร์มกรอกข้อมูล */
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #617d98; font-size: 13px; font-weight: bold;}
        input[type="text"], input[type="number"] {
            width: 100%; padding: 12px; border: 1px solid #ffe3e2; border-radius: 12px; font-size: 15px; background-color: #fffaf9; transition: 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none; border-color: #ffb7b2; background-color: #fff; box-shadow: 0 0 8px rgba(255, 183, 178, 0.2);
        }
        .type-group { display: flex; gap: 12px; }
        .type-btn { flex: 1; }
        .type-btn input[type="radio"] { display: none; }
        .type-btn label {
            display: block; background: #fff; border: 2px solid #fff0ef; padding: 12px;
            text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; color: #829ab1;
            box-shadow: 0 3px 8px rgba(0,0,0,0.02);
        }
        #type-income:checked + label { background-color: #e8f8f0; border-color: #2bb673; color: #2bb673; }
        #type-expense:checked + label { background-color: #fff5f5; border-color: #ff6b6b; color: #ff6b6b; }

        .btn-submit { background-color: #ffb7b2; color: white; border: none; padding: 13px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 183, 178, 0.4); }
        .btn-submit:hover { background-color: #ff9e99; transform: translateY(-1px); }
        .btn-cancel { background-color: #cbd5e1; color: #475569; border: none; padding: 13px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; display: none; }
        
        .backup-zone { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 25px; 
            border-top: 2px dashed #ffe3e2; 
            padding-top: 20px; 
        }
        .backup-buttons { 
            display: flex; 
            gap: 12px; 
        }
        .btn-backup, .btn-import-label { 
            flex: 1; 
            height: 42px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ffb7b2; 
            background: #fffaf9; 
            color: #ff7b7b; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 0;
            padding: 0;
            transition: 0.2s;
        }
        .btn-backup:hover, .btn-import-label:hover {
            background: #ffb7b2;
            color: white;
            border-style: solid;
        }
        .btn-auto-backup-list { 
            width: 100%; 
            height: 38px;
            background: #fff; 
            border: 1px solid #ffe3e2; 
            color: #ff9e99; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-auto-backup-list:hover { background-color: #fffaf9; }
        #import-file { display: none; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 65px;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid #ffe3e2;
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #a0aec0;
            transition: 0.2s;
        }
        .nav-item.active {
            color: #ff6b6b;
            background-color: #fff5f5;
            position: relative;
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #ffb7b2;
        }

        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    
    <h2>📝 บัญชีรายรับ-รายจ่าย</h2>
    <div id="current-date" class="current-date"></div>

    <table class="summary-table">
        <thead>
            <tr>
                <th>ช่วงเวลา</th>
                <th class="text-income">รายรับ (+)</th>
                <th class="text-expense">รายจ่าย (-)</th>
                <th>คงเหลือ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>วันนี้</td>
                <td id="today-income" class="text-income">0.00</td>
                <td id="today-expense" class="text-expense">0.00</td>
                <td id="today-balance" class="text-balance">0.00</td>
            </tr>
            <tr>
                <td>สัปดาห์นี้</td>
                <td id="week-income" class="text-income">0.00</td>
                <td id="week-expense" class="text-expense">0.00</td>
                <td id="week-balance" class="text-balance">0.00</td>
            </tr>
            <tr>
                <td>เดือนนี้</td>
                <td id="month-income" class="text-income">0.00</td>
                <td id="month-expense" class="text-expense">0.00</td>
                <td id="month-balance" class="text-balance">0.00</td>
            </tr>
            <tr>
                <td>ทั้งหมด</td>
                <td id="all-income" class="text-income">0.00</td>
                <td id="all-expense" class="text-expense">0.00</td>
                <td id="all-balance" class="text-balance">0.00</td>
            </tr>
        </tbody>
    </table>

    <div id="page-form" class="page-content active">
        <form id="transaction-form">
            <input type="hidden" id="edit-id">
            
            <div class="form-group">
                <label for="description">ชื่อรายการ</label>
                <input type="text" id="description" list="items-suggestion" placeholder="เช่น เงินเดือน, ค่าเติมน้ำมัน" required autocomplete="off">
                
                <datalist id="items-suggestion">
                    <option value="รายได้วันนี้">
                    <option value="ค่าน้ำมัน">
                    <option value="ค่าอาหาร
